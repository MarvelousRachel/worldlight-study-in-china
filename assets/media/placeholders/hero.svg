    </text>
    <text x="34" y="140" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="600" fill="#0a1024" fill-opacity="0.70">
      Add your real images in: assets/media/
    </text>
    <text x="34" y="176" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="600" fill="#0a1024" fill-opacity="0.70">
      and update the page paths.
    </text>
  </g>

  <g transform="translate(730,420)">
    <rect width="680" height="260" rx="24" fill="#f97316" fill-opacity="0.10" stroke="#f97316" stroke-opacity="0.16" />
    <text x="34" y="90" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="800" fill="#0a1024" fill-opacity="0.90">

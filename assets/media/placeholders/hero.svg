  </text>

  <g transform="translate(170,420)">
    <rect width="520" height="260" rx="24" fill="#1f4dff" fill-opacity="0.10" stroke="#1f4dff" stroke-opacity="0.16" />
    <text x="34" y="90" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="800" fill="#0a1024" fill-opacity="0.90">
